server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Evita cache agressivo do HTML após deploy (Ctrl+Shift+R ainda pode pedir index antigo)
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
